<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 单一图标源:web 左上 logo 与 app icon 同源。改这里后跑 ./generate_icons.sh 同步 .icns/.ico
       设计 C:彩虹旭日 —— 暖色渐变日盘 + 12 道光谱彩色光芒。 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2230"/>
      <stop offset="1" stop-color="#0d1017"/>
    </linearGradient>
    <radialGradient id="disc" cx="42%" cy="38%" r="72%">
      <stop offset="0" stop-color="#fff2c0"/>
      <stop offset="1" stop-color="#ff9d3d"/>
    </radialGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#2a3242" stroke-width="3"/>
  <!-- 12 道光谱光芒(顺时针红→橙→黄→绿→青→蓝→紫→品红) -->
  <g stroke-width="19" stroke-linecap="round">
    <line x1="351" y1="256" x2="404" y2="256" stroke="#ff3b3b"/>
    <line x1="338" y1="304" x2="384" y2="330" stroke="#ff7a2b"/>
    <line x1="304" y1="338" x2="330" y2="384" stroke="#ffb02b"/>
    <line x1="256" y1="351" x2="256" y2="404" stroke="#ffe14d"/>
    <line x1="209" y1="338" x2="182" y2="384" stroke="#b6e83a"/>
    <line x1="174" y1="304" x2="128" y2="330" stroke="#4ad06b"/>
    <line x1="161" y1="256" x2="108" y2="256" stroke="#2bd4b0"/>
    <line x1="174" y1="209" x2="128" y2="182" stroke="#2bc4e8"/>
    <line x1="209" y1="174" x2="182" y2="128" stroke="#2f81f7"/>
    <line x1="256" y1="161" x2="256" y2="108" stroke="#6a5cff"/>
    <line x1="304" y1="174" x2="330" y2="128" stroke="#a64bf4"/>
    <line x1="338" y1="209" x2="384" y2="182" stroke="#f23b9d"/>
  </g>
  <circle cx="256" cy="256" r="74" fill="url(#disc)"/>
</svg>
