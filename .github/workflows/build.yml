name: build

# 云端构建桌面 app:同时产出 macOS(.app)与 Windows(.exe)精简版。
# 触发:推到 main、打 v* 标签、或在 Actions 页面手动 Run。
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: PaperTrading-macos
          - os: windows-latest
            artifact: PaperTrading-windows

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 完整版:装上真实数据源依赖,这样打出来的桌面 app 里通达信/米筐/wind 都能用。
      # spec 用 find_spec 探测,装了才打进去;rqdatac 在个别 runner 上可能装不上,容错跳过即可。
      - name: Install build deps
        run: python -m pip install --upgrade pip pywebview pyinstaller mootdx pandas numpy pymysql

      - name: Install ricequant client (best-effort)
        shell: bash
        run: python -m pip install rqdatac || echo "rqdatac 在此 runner 安装失败,本平台的包将不含米筐(其余数据源不受影响)"

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean paper_trading.spec

      # dist/ 里:macOS 会同时有 PaperTrading/ 和 PaperTrading.app;Windows 是 PaperTrading\PaperTrading.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist
          if-no-files-found: error

  # 仅在打 v* 标签时跑:把两平台产物打成 zip,发布到 Releases 页(同事可免登录下载)。
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Zip each platform
        run: |
          cd artifacts
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -qr "../${name}-${GITHUB_REF_NAME}.zip" .)
          done
          ls -la *.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "自动构建:量化模拟盘桌面包(macOS .app + Windows .exe)。下载对应平台 zip,解压双击即用;数据各自存本机。"
